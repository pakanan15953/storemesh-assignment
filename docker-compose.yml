version: '3.8'

services:
  # ตู้ที่ 1: ฐานข้อมูล PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-storemesh_db}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ตู้ที่ 2: Django Backend
  backend:
    build: ./backend
    # รอให้ PostgreSQL เปิดพอร์ตพร้อมใช้งานก่อน ค่อยเริ่ม migrate, seed และรันเซิร์ฟเวอร์
    command: sh -c "python -c \"import socket, time; port = 5432; host = 'db'; print('Waiting for database...'); [time.sleep(1) for _ in range(30) if socket.socket().connect_ex((host, port)) != 0]\" && python manage.py migrate && python manage.py seed_db && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      # ส่งค่า Environment ไปให้ Django ต่อ Database ได้ถูกต้อง
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-storemesh_db}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_PORT=${DB_PORT:-5432}

  # ตู้ที่ 3: React Frontend (Vite)
  frontend:
    build: ./frontend
    # สั่งรัน Vite โดยเปิด Host ให้เข้าถึงได้จากภายนอก Container
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173" # Port เริ่มต้นของ Vite
    depends_on:
      - backend

volumes:
  # สร้างพื้นที่เก็บข้อมูล เพื่อไม่ให้ข้อมูลหายตอนปิด Container
  postgres_data: